<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Shopping List</title>
  <meta name="theme-color" content="#113a5d" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Shopping List" />
  <link rel="stylesheet" href="styles.v1.7.1.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <img src="icon.svg" alt="App icon" class="brand-icon" />
        <div>
          <h1>Shared Shopping List</h1>
          <div class="subline">
            <span id="modeBadge" class="mode-badge">Starting…</span>
            <span id="syncBadge" class="sync-badge sync-starting">Starting…</span>
            <span class="version-flag">v1.7.1</span>
          </div>
        </div>
      </div>
    </header>

    <div id="statusBar" class="status-bar"></div>

    <nav class="tabbar" id="tabBar"></nav>

    <main class="main-grid" id="mainGrid"></main>
  </div>

  <button id="floatingAddBtn" class="floating-add" aria-label="Add item">＋</button>

  <dialog id="itemModal" class="modal-card">
    <form method="dialog" id="itemForm">
      <div class="modal-head">
        <h2 id="modalTitle">Add Item</h2>
        <button type="button" id="closeModalBtn" class="icon-btn">✕</button>
      </div>

      <div class="modal-grid compact-grid">
        <label class="full-row">
          <span>Item</span>
          <input id="itemNameInput" type="text" maxlength="120" autocomplete="off" required />
        </label>

        <div id="parentSelector" class="parent-selector full-row">
          <span>Parent list</span>
          <label><input type="checkbox" id="parentPoirier" /> Poirier</label>
          <label><input type="checkbox" id="parentSchaffer" /> Shafer</label>
        </div>

        <label id="categoryPickerWrap" class="full-row hidden">
          <span>Category</span>
          <select id="categoryPicker"></select>
          <small class="helper">Unknown item. Pick a category and it will be remembered next time.</small>
        </label>
      </div>

      <div class="modal-actions">
        <button type="submit" class="primary-btn">Add</button>
        <button type="button" id="cancelModalBtn" class="secondary-btn">Cancel</button>
      </div>
    </form>
  </dialog>

  <dialog id="storeModal" class="modal-card small-modal">
    <form method="dialog" id="storeForm">
      <div class="modal-head">
        <h2>Add Store</h2>
        <button type="button" id="closeStoreModalBtn" class="icon-btn">✕</button>
      </div>
      <div class="modal-grid compact-grid">
        <label class="full-row">
          <span>Store name</span>
          <input id="storeNameInput" type="text" maxlength="60" autocomplete="off" required />
        </label>
      </div>
      <div class="modal-actions">
        <button type="submit" class="primary-btn">Save Store</button>
        <button type="button" id="cancelStoreModalBtn" class="secondary-btn">Cancel</button>
      </div>
    </form>
  </dialog>

  <script src="app.v1.7.1.js"></script>
</body>
</html>
